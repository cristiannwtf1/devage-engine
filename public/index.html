<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>DEVAGE ENGINE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #111120;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 18px;
      color: #7b8cde;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #tick-info {
      font-size: 13px;
      color: #555;
    }
    #tick-info span { color: #7b8cde; }

    #controls { display: flex; gap: 8px; }

    button {
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      color: #aab;
      padding: 4px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a4e; color: #fff; }
    button.active { background: #2a2a6e; color: #7b8cde; border-color: #7b8cde; }

    /* ── MAIN LAYOUT ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── CANVAS ── */
    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080810;
      padding: 12px;
      overflow: auto;
    }

    canvas {
      image-rendering: pixelated;
      border: 1px solid #1a1a3a;
      flex-shrink: 0;
    }

    /* ── PANEL LATERAL ── */
    #panel {
      width: 260px;
      background: #0e0e1c;
      border-left: 1px solid #1a1a3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-top {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      max-height: 55%;
      flex-shrink: 0;
    }

    .panel-section h3 {
      font-size: 10px;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 6px;
      border-bottom: 1px solid #1a1a2e;
      padding-bottom: 4px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat-label { color: #666; }
    .stat-value { color: #9ab; }
    .stat-value.highlight { color: #7b8cde; }

    .energy-bar-wrapper { margin-top: 4px; }
    .energy-bar-bg {
      background: #1a1a2e;
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
      margin-top: 2px;
    }
    .energy-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3a3aaa, #7b8cde);
      border-radius: 2px;
      transition: width 0.2s;
    }

    .worker-entry {
      font-size: 11px;
      margin-bottom: 5px;
      padding: 4px 6px;
      background: #111120;
      border-radius: 3px;
      border-left: 2px solid #3a3a6a;
    }
    .worker-entry .wid    { color: #555; font-size: 10px; }
    .worker-entry .wstate { color: #7b8cde; font-size: 10px; }
    .worker-entry .wenergy { color: #5a8a5a; font-size: 10px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      margin-bottom: 4px;
      color: #666;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── EDITOR DE CÓDIGO ── */
    #editor-panel {
      border-top: 2px solid #2a2a5a;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: #08080e;
      min-height: 0;
    }

    #editor-panel h3 {
      font-size: 10px;
      letter-spacing: 2px;
      color: #7b8cde;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #editor-panel h3 .script-status {
      font-size: 10px;
      letter-spacing: 0;
      padding: 1px 6px;
      border-radius: 2px;
      background: #1a1a2e;
    }
    #editor-panel h3 .script-status.active { color: #4a9a4a; background: #0a1a0a; }
    #editor-panel h3 .script-status.idle   { color: #555; }

    #code-editor {
      flex: 1;
      min-height: 80px;
      background: #06060c;
      border: 1px solid #2a2a4a;
      color: #b0c4ff;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 8px;
      resize: none;
      outline: none;
      border-radius: 2px;
    }
    #code-editor:focus { border-color: #4a4a8a; }

    #editor-footer {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }

    #btn-run {
      background: #1a3a1a;
      border-color: #3a6a3a;
      color: #4a9a4a;
      font-weight: bold;
      flex-shrink: 0;
    }
    #btn-run:hover { background: #2a5a2a; color: #6acc6a; }

    #btn-clear {
      background: #1a1a1a;
      border-color: #3a3a3a;
      color: #555;
      flex-shrink: 0;
    }
    #btn-clear:hover { background: #2a1a1a; color: #aa5555; }

    #script-error {
      display: none;
      font-size: 10px;
      color: #cc4444;
      background: #1a0606;
      border: 1px solid #4a1a1a;
      border-radius: 2px;
      padding: 5px 7px;
      margin-top: 5px;
      word-break: break-all;
      line-height: 1.4;
    }

    /* ── STATUS BAR ── */
    #status-bar {
      padding: 4px 12px;
      font-size: 11px;
      color: #333;
      background: #080810;
      border-top: 1px solid #1a1a2a;
      flex-shrink: 0;
    }
    #status-bar.connected    { color: #3a6a3a; }
    #status-bar.disconnected { color: #6a3a3a; }
  </style>
</head>
<body>

  <div id="header">
    <h1>⚔ DEVAGE ENGINE</h1>
    <div id="tick-info">Tick: <span id="tick">—</span></div>
    <div id="controls">
      <button id="btn-pause">⏸ Pausar</button>
    </div>
  </div>

  <div id="main">
    <div id="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="panel">
      <div id="panel-top">
        <div class="panel-section">
          <h3>Base</h3>
          <div class="stat-row">
            <span class="stat-label">Energía</span>
            <span class="stat-value highlight" id="base-energy">—</span>
          </div>
          <div class="energy-bar-wrapper">
            <div class="energy-bar-bg">
              <div class="energy-bar-fill" id="base-energy-bar" style="width:0%"></div>
            </div>
          </div>
          <div class="stat-row" style="margin-top:6px">
            <span class="stat-label">Workers</span>
            <span class="stat-value" id="worker-count">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Extensions</span>
            <span class="stat-value" id="ext-count">—</span>
          </div>
        </div>

        <div class="panel-section">
          <h3>Workers</h3>
          <div id="worker-list"></div>
        </div>

        <div class="panel-section">
          <h3 style="color:#cc4444">IA Enemiga</h3>
          <div class="stat-row">
            <span class="stat-label">Energía</span>
            <span class="stat-value" id="ai-energy" style="color:#cc6644">—</span>
          </div>
          <div class="energy-bar-wrapper">
            <div class="energy-bar-bg">
              <div class="energy-bar-fill" id="ai-energy-bar" style="width:0%; background: linear-gradient(90deg, #6a1010, #cc3322)"></div>
            </div>
          </div>
          <div class="stat-row" style="margin-top:6px">
            <span class="stat-label">Workers</span>
            <span class="stat-value" id="ai-worker-count" style="color:#cc6644">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Extensions</span>
            <span class="stat-value" id="ai-ext-count" style="color:#cc6644">—</span>
          </div>
        </div>

        <div class="panel-section">
          <h3>Leyenda</h3>
          <div class="legend-item"><div class="legend-dot" style="background:#3a5a8a"></div> Base</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4a7a4a"></div> Worker</div>
          <div class="legend-item"><div class="legend-dot" style="background:#8a7a2a"></div> Source</div>
          <div class="legend-item"><div class="legend-dot" style="background:#5a3a8a"></div> Extension</div>
          <div class="legend-item"><div class="legend-dot" style="background:#cc2222"></div> Base IA</div>
          <div class="legend-item"><div class="legend-dot" style="background:#cc5500"></div> Worker IA</div>
          <div class="legend-item"><div class="legend-dot" style="background:#2a2a2a"></div> Piso</div>
          <div class="legend-item"><div class="legend-dot" style="background:#111"></div> Muro</div>
        </div>
      </div>

      <!-- ── EDITOR DE CÓDIGO ─────────────────── -->
      <div id="editor-panel">
        <h3>
          Script
          <span id="script-status" class="script-status idle">sin script</span>
        </h3>
        <textarea id="code-editor" spellcheck="false" placeholder="// Escribe tu JS aquí...
// El código corre cada tick

for (const id in Game.workers) {
  const w = Game.workers[id]
  // w.harvest(sourceId)
  // w.transfer(Game.base.id)
  // w.moveTo(x, y)
}"></textarea>
        <div id="editor-footer">
          <button id="btn-run">▶ Ejecutar</button>
          <button id="btn-clear">✕ Limpiar</button>
        </div>
        <div id="script-error"></div>
      </div>
    </div>
  </div>

  <div id="status-bar">Conectando...</div>

  <script src="game.js"></script>
</body>
</html>
