<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>DEVAGE ENGINE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:    #00ffbb;
      --cyan-d:  #00bb88;
      --red:     #ff5544;
      --red-d:   #cc2222;
      --gold:    #ffcc00;
      --blue:    #4477ff;
      --blue-d:  #1a2a5a;
      --bg:      #040408;
      --bg-2:    #07070e;
      --bg-3:    #0a0a14;
      --border:  #111128;
      --border2: #1a1a33;
      --text:    #8899bb;
      --text-d:  #334466;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border2);
      flex-shrink: 0;
      position: relative;
    }

    /* Línea de neón en el borde inferior del header */
    #header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue) 30%, var(--cyan-d) 50%, var(--blue) 70%, transparent);
      opacity: 0.6;
    }

    #header h1 {
      font-size: 17px;
      color: var(--cyan);
      letter-spacing: 4px;
      text-shadow: 0 0 14px rgba(0,255,187,0.5);
    }

    #header h1 span { color: var(--text-d); font-size: 12px; letter-spacing: 1px; margin-left: 8px; }

    #tick-info { font-size: 12px; color: var(--text-d); letter-spacing: 1px; }
    #tick-info span { color: var(--cyan); text-shadow: 0 0 8px rgba(0,255,187,0.4); }

    #controls { display: flex; gap: 8px; }

    button {
      background: var(--bg-3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 4px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--cyan-d); color: var(--cyan); box-shadow: 0 0 8px rgba(0,255,187,0.15); }
    button.active { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,255,187,0.25); }

    /* ── MAIN ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── CANVAS ── */
    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 12px;
      overflow: auto;
      position: relative;
    }

    /* Esquinas decorativas alrededor del canvas */
    #canvas-wrapper::before, #canvas-wrapper::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--blue-d);
      border-style: solid;
      opacity: 0.6;
    }
    #canvas-wrapper::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
    #canvas-wrapper::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

    canvas { image-rendering: pixelated; flex-shrink: 0; }

    /* ── PANEL ── */
    #panel {
      width: 260px;
      background: var(--bg-2);
      border-left: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-top {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: 52%;
      flex-shrink: 0;
    }

    /* Scrollbar estilizado */
    #panel-top::-webkit-scrollbar { width: 3px; }
    #panel-top::-webkit-scrollbar-track { background: var(--bg); }
    #panel-top::-webkit-scrollbar-thumb { background: var(--border2); }

    .panel-section { border: 1px solid var(--border); padding: 8px; position: relative; }

    .panel-section::before {
      content: '';
      position: absolute;
      top: -1px; left: 12px; right: 12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2), transparent);
    }

    .panel-section h3 {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-d);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .panel-section.player h3 { color: var(--cyan-d); text-shadow: 0 0 6px rgba(0,255,187,0.3); }
    .panel-section.enemy  h3 { color: #aa3333; text-shadow: 0 0 6px rgba(255,50,50,0.3); }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .stat-label { color: var(--text-d); }
    .stat-value { color: var(--text); }
    .stat-value.player-val { color: var(--cyan); text-shadow: 0 0 6px rgba(0,255,187,0.3); }
    .stat-value.enemy-val  { color: #cc5533; text-shadow: 0 0 6px rgba(255,80,0,0.3); }

    .energy-bar-bg {
      background: var(--bg);
      height: 4px;
      margin-top: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .energy-bar-fill {
      height: 100%;
      transition: width 0.3s;
    }
    .energy-bar-fill.player { background: linear-gradient(90deg, #006644, #00ffbb); box-shadow: 0 0 6px rgba(0,255,187,0.5); }
    .energy-bar-fill.enemy  { background: linear-gradient(90deg, #660000, #ff5500); box-shadow: 0 0 6px rgba(255,80,0,0.5); }

    /* Sparkline canvas */
    .sparkline { display: block; width: 100%; height: 36px; margin-top: 5px; }

    /* Dominancia */
    #dominance-bar-bg {
      height: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }
    #dominance-player {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, #003322, #00ffbb);
      transition: width 0.4s;
    }
    #dominance-ai {
      position: absolute; right: 0; top: 0; bottom: 0;
      background: linear-gradient(270deg, #330000, #ff5500);
      transition: width 0.4s;
    }
    #dominance-center {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: var(--border2);
    }
    .dominance-labels {
      display: flex; justify-content: space-between;
      font-size: 8px; letter-spacing: 1px;
      color: var(--text-d); margin-top: 3px;
    }

    /* Worker dots */
    #worker-dots { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .wdot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid transparent;
      cursor: default;
    }

    /* Event log */
    #event-log { display: flex; flex-direction: column; gap: 2px; }
    .event-entry {
      font-size: 9px; letter-spacing: 0.3px;
      color: var(--text-d);
      padding: 2px 0;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 5px; align-items: baseline;
    }
    .event-entry .etick { color: var(--text-d); opacity: 0.5; flex-shrink: 0; }
    .event-entry.ev-player { color: var(--cyan-d); }
    .event-entry.ev-ai     { color: #cc5533; }
    .event-entry.ev-world  { color: #998800; }

    /* Leyenda */
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; margin-bottom: 3px; color: var(--text-d); letter-spacing: 0.5px;
    }
    .legend-dot { width: 9px; height: 9px; flex-shrink: 0; }

    /* ── EDITOR ── */
    #editor-panel {
      border-top: 1px solid var(--border2);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: #050509;
      min-height: 0;
    }

    #editor-panel h3 {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-d);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .script-status {
      font-size: 9px; letter-spacing: 1px;
      padding: 1px 6px; border: 1px solid var(--border);
    }
    .script-status.active { color: var(--cyan-d); border-color: var(--cyan-d); box-shadow: 0 0 6px rgba(0,255,187,0.2); }
    .script-status.idle   { color: var(--text-d); }

    #code-editor {
      flex: 1; min-height: 80px;
      background: #030306;
      border: 1px solid var(--border2);
      color: #7799ee;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.55;
      padding: 8px;
      resize: none; outline: none;
    }
    #code-editor:focus { border-color: var(--blue); }
    #code-editor::placeholder { color: var(--border2); }

    #editor-footer { display: flex; gap: 6px; margin-top: 6px; }

    #btn-run   { border-color: var(--cyan-d); color: var(--cyan-d); }
    #btn-run:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 8px rgba(0,255,187,0.2); }

    #btn-clear { border-color: var(--border2); color: var(--text-d); }
    #btn-clear:hover { border-color: #aa3333; color: #cc4444; }

    #script-error {
      display: none;
      font-size: 10px;
      color: var(--red);
      background: #0d0305;
      border: 1px solid #3a0808;
      padding: 5px 7px;
      margin-top: 5px;
      word-break: break-all;
      line-height: 1.4;
      letter-spacing: 0.3px;
    }

    /* ── STATUS BAR ── */
    #status-bar {
      padding: 3px 12px;
      font-size: 10px;
      color: var(--text-d);
      background: var(--bg);
      border-top: 1px solid var(--border);
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    #status-bar.connected    { color: var(--cyan-d); }
    #status-bar.disconnected { color: var(--red-d); }
  </style>
</head>
<body>

  <div id="header">
    <h1>⬡ DEVAGE ENGINE <span>v2.0 — La Red de Neones</span></h1>
    <div id="tick-info">TICK <span id="tick">—</span></div>
    <div id="controls">
      <button id="btn-pause">⏸ Pausar</button>
    </div>
  </div>

  <div id="main">
    <div id="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="panel">
      <div id="panel-top">

        <!-- ── JUGADOR ── -->
        <div class="panel-section player">
          <h3>◈ Jugador</h3>
          <div class="stat-row">
            <span class="stat-label">Energía</span>
            <span class="stat-value player-val" id="base-energy">—</span>
          </div>
          <div class="energy-bar-bg">
            <div class="energy-bar-fill player" id="base-energy-bar" style="width:0%"></div>
          </div>
          <canvas id="sparkline-player" class="sparkline"></canvas>
          <div class="stat-row" style="margin-top:4px">
            <span class="stat-label">Workers</span>
            <span class="stat-value" id="worker-count">—</span>
            <span class="stat-label" style="margin-left:8px">Ext</span>
            <span class="stat-value" id="ext-count">—</span>
          </div>
        </div>

        <!-- ── IA ── -->
        <div class="panel-section enemy">
          <h3>◈ IA Enemiga</h3>
          <div class="stat-row">
            <span class="stat-label">Energía</span>
            <span class="stat-value enemy-val" id="ai-energy">—</span>
          </div>
          <div class="energy-bar-bg">
            <div class="energy-bar-fill enemy" id="ai-energy-bar" style="width:0%"></div>
          </div>
          <canvas id="sparkline-ai" class="sparkline"></canvas>
          <div class="stat-row" style="margin-top:4px">
            <span class="stat-label">Workers</span>
            <span class="stat-value" id="ai-worker-count">—</span>
            <span class="stat-label" style="margin-left:8px">Ext</span>
            <span class="stat-value" id="ai-ext-count">—</span>
          </div>
        </div>

        <!-- ── DOMINANCIA ── -->
        <div class="panel-section">
          <h3>Dominancia</h3>
          <div id="dominance-bar-bg">
            <div id="dominance-player"></div>
            <div id="dominance-ai"></div>
            <div id="dominance-center"></div>
          </div>
          <div class="dominance-labels">
            <span id="dom-player-pct" style="color:var(--cyan-d)">50%</span>
            <span style="color:var(--text-d)">vs</span>
            <span id="dom-ai-pct" style="color:#cc5533">50%</span>
          </div>
        </div>

        <!-- ── WORKERS GRID ── -->
        <div class="panel-section">
          <h3>Fuerza de trabajo</h3>
          <div id="worker-dots"></div>
        </div>

        <!-- ── LOG DE EVENTOS ── -->
        <div class="panel-section">
          <h3>Eventos</h3>
          <div id="event-log"></div>
        </div>

      </div>

      <div id="editor-panel">
        <h3>
          Script
          <span id="script-status" class="script-status idle">sin script</span>
        </h3>
        <textarea id="code-editor" spellcheck="false" placeholder="// Tu código JS corre cada tick
// Controla tus workers:

for (const id in Game.workers) {
  const w = Game.workers[id]
  // w.harvest(sourceId)
  // w.transfer(Game.base.id)
  // w.moveTo(x, y)
}"></textarea>
        <div id="editor-footer">
          <button id="btn-run">▶ Ejecutar</button>
          <button id="btn-clear">✕ Limpiar</button>
        </div>
        <div id="script-error"></div>
      </div>
    </div>
  </div>

  <div id="status-bar">Conectando...</div>

  <script src="game.js"></script>
</body>
</html>
